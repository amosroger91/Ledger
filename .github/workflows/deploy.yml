name: Deploy to GitHub Pages

# Builds the Vite app on every push to main and publishes dist/ to GitHub Pages.
# main stays pure source — nothing built is ever committed. Requires the repo's
# Settings → Pages → Source to be set to "GitHub Actions" (one-time).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-progress deploy, but don't cancel a run
# that's mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Use `npm install`, not `npm ci`: the repo is developed on Windows, whose
      # lockfile omits the Linux-specific optional native deps (esbuild/rollup),
      # which makes the strict `npm ci` fail here. `npm install` resolves the
      # right platform binaries on Linux and still respects the lock.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
